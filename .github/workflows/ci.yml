---
name: Continuous Integration

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  fast-checks:
    name: ­¤Åü Fast Checks (Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Run format checks
        run: cargo +nightly fmt --all -- --check

  build-and-test-matrix:
    name: ­¤øĀ’ĖÅ Build & Test Matrix
    needs: fast-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq --no-install-recommends \
            libclang-dev \
            protobuf-compiler
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install protobuf
      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none
      - name: Build
        run: cargo build --release
      - name: Check no-std (without rand)
        run: cargo check --package qp-plonky2 --no-default-features
      - name: Test
        run: cargo test --release

  analysis:
    name: ­¤ż¢ Analysis (Doc)
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq --no-install-recommends \
            libclang-dev \
            protobuf-compiler
      - name: Install required components
        run: rustup component add rust-src
      - name: Run doc
        run: cargo doc --no-deps

  formal-spec:
    name: ­¤ōÉ Formal Spec (Lean)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Builds the Lean 4 gadgetŌåÆconstraint model under `formal/` (see formal/PLAN.md).
      # Step 1 is deliberately mathlib-free and builds in seconds; `lake build`
      # type-checks every proof in the kernel, so a later edit that breaks a proof
      # fails CI instead of rotting silently. elan/lake come from
      # `formal/lean-toolchain` (Lean v4.30). `leanchecker` re-checks the compiled
      # environment with an independent kernel checker (bundled on v4.30).
      - name: Build formal spec (lake build)
        # Pinned to a full commit SHA (supply-chain hardening). 38fbc41 == v1.5.0.
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: "formal"
          use-mathlib-cache: "false"
          leanchecker: "true"
      # No-`sorry` gate: the model must stay gap-free. Fail if any proof term uses a
      # `sorry`/`admit`/`sorryAx` placeholder. (Keep those literal words out of
      # comments/strings under `formal/` so this stays a clean signal.)
      - name: Assert the spec contains no sorry/admit
        run: |
          if grep -rEn '\b(sorry|admit|sorryAx)\b' --include='*.lean' formal; then
            echo "::error::formal spec contains a sorry/admit placeholder"
            exit 1
          fi

  security-audit:
    name: ­¤öÆ Security Audit
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit
