---
name: Continuous Integration

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  fast-checks:
    name: 🏁 Fast Checks (Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Run format checks
        run: cargo +nightly fmt --all -- --check

  build-and-test-matrix:
    name: 🛠️ Build & Test Matrix
    needs: fast-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq --no-install-recommends \
            libclang-dev \
            protobuf-compiler
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install protobuf
      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none
      - name: Build
        run: cargo build --release
      - name: Check no-std (without rand)
        run: cargo check --package qp-plonky2 --no-default-features
      - name: Test
        run: cargo test --release
      # The constraint exporter is a formal-verification dev tool (not in
      # `default-members`, so the commands above skip it). Its differential tests
      # check, at random points, that (a) the symbolically-extracted gate constraints
      # match the real `GoldilocksField` `eval_unfiltered`, (b) the extracted Poseidon2
      # primitives match the real helpers, and (c) the Lean sponge model's wrapper
      # matches `Poseidon2Hash::hash_no_pad` — the Rust half of the guarantees whose
      # Lean half is the `Generated/*Bridge.lean` `ring` lemmas and `Sponge.lean`.
      - name: Test constraint exporter (extraction == real gate)
        run: cargo test --release -p qp-plonky2-constraint-exporter
      # Guard against a stale committed generated Lean: regenerate from the live
      # gate code and fail if it differs from what is checked in. Run once (Linux).
      - name: Check generated Lean is up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo run --release -p qp-plonky2-constraint-exporter --bin export-constraints >/dev/null
          git diff --exit-code -- formal/Plonky2Spec/Generated/ \
            || (echo "::error::formal/Plonky2Spec/Generated/ is stale; rerun the exporter" && exit 1)

  analysis:
    name: 🤖 Analysis (Doc)
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq --no-install-recommends \
            libclang-dev \
            protobuf-compiler
      - name: Install required components
        run: rustup component add rust-src
      - name: Run doc
        run: cargo doc --no-deps

  formal-spec:
    name: 📐 Formal Spec (Lean)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Builds the Lean 4 gadget→constraint model under `formal/` (see formal/PLAN.md).
      # `lake build` type-checks every proof in the kernel, so a later edit that
      # breaks a proof fails CI instead of rotting silently. elan/lake come from
      # `formal/lean-toolchain` (Lean v4.30). `leanchecker` re-checks the compiled
      # environment with an independent kernel checker (bundled on v4.30).
      #
      # The package depends on mathlib (pinned to v4.30.0) for the `ZMod p` field
      # model, so `use-mathlib-cache: true` makes the action fetch the prebuilt
      # `.olean` cache instead of compiling mathlib from source.
      - name: Build formal spec (lake build)
        # Pinned to a full commit SHA (supply-chain hardening). 38fbc41 == v1.5.0.
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: "formal"
          use-mathlib-cache: "true"
          leanchecker: "true"
      # No-`sorry` gate: the model must stay gap-free. Fail if any proof term uses a
      # `sorry`/`admit`/`sorryAx` placeholder. (Keep those literal words out of
      # comments/strings under `formal/` so this stays a clean signal.)
      - name: Assert the spec contains no sorry/admit
        run: |
          if grep -rEn '\b(sorry|admit|sorryAx)\b' --include='*.lean' formal; then
            echo "::error::formal spec contains a sorry/admit placeholder"
            exit 1
          fi

  security-audit:
    name: 🔒 Security Audit
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit
