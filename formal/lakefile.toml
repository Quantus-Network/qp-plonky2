# Lean 4 formal-spec package for the qp-plonky2 gadgetâ†’constraint layer.
#
# This is the "layer-2" bridge package described in `PLAN.md`: it formalizes the
# *constraint semantics* of the plonky2 gadgets the wormhole circuits use, so the
# spec relations in `qp-zk-circuits/formal` can be proved to be what the circuit
# constraints actually enforce.
#
# mathlib is pinned to the `v4.30.0` tag, which matches `lean-toolchain`
# (leanprover/lean4:v4.30.0) exactly. It provides the concrete Goldilocks field
# `ZMod p`, the prime-field integral-domain fact the range primitive's product
# form rests on, and the `.val` bridge to the spec. After editing this file:
#     lake update mathlib      # resolves mathlib + transitive deps (writes the manifest)
#     lake exe cache get        # downloads prebuilt .olean cache (run BEFORE `lake build`)
#     lake build
# CI: flip the `formal-spec` job to `use-mathlib-cache: "true"` so the runner
# fetches the cache instead of compiling mathlib from source.
# `defaultTargets` is *only* `Plonky2Spec`: the hermetic `lake build` (and the
# `formal-spec` CI job) build the mathlib gadget model alone, with no dependency on
# the sibling `qp-zk-circuits` checkout. The cross-package bridge below is an explicit,
# opt-in target (`lake build Plonky2Bridge`).
defaultTargets = ["Plonky2Spec"]
name = "plonky2Spec"

[[require]]
name = "mathlib"
scope = "leanprover-community"
version = "git#v4.30.0"

# The spec package (`qp-zk-circuits/formal`), pulled in as a light *local* dependency
# for the composition bridge only (PLAN.md Â§6). It is mathlib-free and builds in
# seconds; requiring it here does not affect the `Plonky2Spec` default build. Assumes
# the two repos are checked out as siblings.
[[require]]
name = "wormholeSpec"
path = "../../qp-zk-circuits/formal"

[[lean_lib]]
name = "Plonky2Spec"

# The composition bridge (PLAN.md Â§6): instantiates the spec's `WormholeSpec.RandomOracle`
# with the concrete finite-field Poseidon2 sponge and pins down the `.val` carrier seam.
# Imports BOTH packages, so it is kept out of `defaultTargets` to preserve the hermetic,
# mathlib-free spec build and the sibling-free `Plonky2Spec` CI job.
[[lean_lib]]
name = "Plonky2Bridge"
